<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intro to Bootsrap</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <style>
      .container {
        border: 1px solid black;
        background-color: lightblue;
        height: 1000px;
      }

      h1 {
        text-align: center;
        color: coral;
      }

      .hobby-card{
        text-align:center;
        padding:20px;
        margin-bottom:20px;
        background-color:lightcoral;
        border:1px solid rgb(228, 106, 62);
      }
    </style>
  </head>
  <body>
    <h1>My Hobby Cards</h1>

    <div class="container">
      <div class="row">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="hobby-card">
        <h3>Drawing</h3>
        <p>I love Drawing</p>
          </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <div class="hobby-card">
        <h3>Football</h3>
        <p>I Love Football</p>
          </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
          <div class="hobby-card">
        <h3>Reading</h3>
        <p>I Love Reading</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
