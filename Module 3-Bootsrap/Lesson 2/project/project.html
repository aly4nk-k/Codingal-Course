 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSplash</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" href="water.png">
    <style>
header{
    display:flex;
}

.logo{
    background-size:cover;
    width:50px;
    height:50px;
}

.hding{
    font-size:20px;
    margin-top:10px;
    color:rgb(0, 49, 105);
}

.bg-img{
    background-image: url("adventure.png");
    background-size:cover;
    background-repeat:no-repeat;
    height:450px;
    width:100vw;
    color:white;
    text-align:center;
    padding-top:150px;
}

.font{
    font-family: "DynaPuff", sans-serif;
}

.cherry {
    font-family: "Cherry Bomb One", cursive;
    text-align:center;
}

pre{
    background-color: #121714;
    border:2px solid black;
    width:450px;
    margin:0 auto;
    display:block;
    color: #7CFF8A;
    padding:15px 15px;
}

.timings{
    border:2px solid black;
    margin-top:30px;
    width:650px;
    margin-left:15px;
    height:250px;
}


    </style>
 </head>
 <body>
    <header>
        <img src="water.png" class="logo rounded-circle">
        <h1 class="hding">Aqua Splash</h1>
    </header>

    <main>
        <section class="bg-img">
<h2 class="display-2 font">Fun Begins Here</h2>
        </section>
        <section class="flex">
            <div class="timings">
    <p class="display-4 cherry">Our Timings</p>
    <pre>
Full Day Pass: 9 AM to 11 PM

Half Day Pass: 12 PM to 7 PM
    </pre>
    </div>
        </section>
    </main>
