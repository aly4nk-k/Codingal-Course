    <h1>UrbanCart</h1>

<p><strong>All Your Shopping Needs On One Page</strong></p>

<h2>Sign up to Start Shopping</h2>
<form>
    <fieldset>
<legend><h3>Personel Details</h3></legend>
    <label>First Name</label><br />
<input type="text" id="name1" name="name">
<br /><br />
<label>Last Name <small>(Optional)</small></label><br />
<input type="text" id="name2" name="name">
<br /><br />
<label>Birthday</label><br />
<input type="date" name="date" id="date" />
<br /><br />
<label>Email Address</label><br />

<br /><br />

<label>Username</label><br />

<input type="text" id="password" name="password"><br /><br />
<label for="Address" style="display:block;">Address</label>
<textarea rows="5" cols="50" placeholder="Enter Description Here..."></textarea><br /><br />

<label>Telephone Number</label><br />
<input type="text" id="Telephone" name="Telephone"><br /><br />

<button>
