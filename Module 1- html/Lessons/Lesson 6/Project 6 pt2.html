<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanCart.com</title>
</head>
<body>
    <h1>UrbanCart</h1>
<form>
    <fieldset>
      <legend><h3>Select Your Interests</h3></legend>  
<label>What Types Of Products Are You Interested In?</label><br /><br />
<input type="checkbox" name="products" id="Clothing"> Clothing <br />
<input type="checkbox" name="Products" id="Electronics"> Electronics <br />
<input type="checkbox" name="Products" id="Food & Groceries"> Food & Groceries <br />
<input type="checkbox" name="Products" id="Home & Kitchen"> Home & Kitchen <br />
<input type="checkbox" name="Products" id="Sports"> Sports <br />
<input type="checkbox" name="Products" id="Beauty & Personel Care"> Beauty & Personel Care <br /><br />

<label>How often Do You Shop Online?</label><br />
<input type="radio" name="Time" id="Daily"> Daily <br />
<input type="radio" name="Time" id="Weekly"> Weekly <br />
<input type="radio" name="Time" id="Monthly"> Monthly <br />
<input type="radio" name="Time" id="Rarely"> Rarely <br /><br />

<label>What Is Your Budget Range?</label><br />
<select name="Budget" id="Budget">
    <option value="AED 100 - AED 500">AED 100 - AED 500</option>
    <option value="AED 500 - AED 1500">AED 500 - AED 1500</option>
    <option value="AED 1500+">AED 1500+</option>
</select><br /><br />

<small><label>Would you like to receive exclusive offers and discounts?</label><br />
    <input type="radio" name="subject" id="Yes"> Yes <br />
    <input type="radio" name="subject" id="No"> No <br /><br />
</small>
<input type="submit" value="Create Account"><br /><br />


    </fieldset>
</form>
